<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>smartSchedule | Unified Academic Portal</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Main Card - Wider width */
        .portal-card {
            width: 100%;
            max-width: 620px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 36px 34px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: #64748b;
        }

        /* Role Tabs */
        .role-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(30, 41, 59, 0.6);
            padding: 6px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab i {
            width: 18px;
            height: 18px;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .tab:hover:not(.active) {
            background: rgba(59, 130, 246, 0.2);
            color: white;
        }

        /* Form Container */
        .form-container {
            transition: all 0.3s ease;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #64748b;
            pointer-events: none;
        }

        input, select {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            font-size: 14px;
            color: #f1f5f9;
            transition: all 0.3s;
            outline: none;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        select option {
            background: #1e293b;
            color: #f1f5f9;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Double Input Group - Side by side properly */
        .double-input {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .double-input .input-wrapper {
            flex: 1;
        }

        .double-input span {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            padding: 0 4px;
        }

        /* Dynamic Fields Animation */
        .dynamic-fields {
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 14px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: white;
        }

        /* Footer Links */
        .form-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }

        .link {
            color: #60a5fa;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .link:hover {
            color: #a78bfa;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0 22px;
            color: #475569;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #334155;
            margin: 0 14px;
        }

        /* Alert Message */
        .alert {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .alert.show {
            display: flex;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fecaca;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }

        /* Hidden Class */
        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 680px) {
            .portal-card {
                max-width: 100%;
                padding: 28px 24px;
                margin: 16px;
            }
            .double-input {
                flex-direction: column;
                gap: 12px;
            }
            .double-input span {
                display: none;
            }
            .tab {
                padding: 10px 12px;
                font-size: 13px;
            }
            .header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .portal-card {
                padding: 24px 20px;
            }
            .role-tabs {
                gap: 8px;
            }
            .tab {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="header">
            <div class="logo-icon">
                <i data-lucide="graduation-cap" width="32" height="32" style="color: white;"></i>
            </div>
            <h1>smartSchedule</h1>
            <p>secure academic access portal</p>
        </div>

        <!-- Role Tabs -->
        <div class="role-tabs">
            <button class="tab active" onclick="switchRole('admin')">
                <i data-lucide="shield" width="16" height="16"></i>
                <span>Admin</span>
            </button>
            <button class="tab" onclick="switchRole('faculty')">
                <i data-lucide="users" width="16" height="16"></i>
                <span>Faculty</span>
            </button>
            <button class="tab" onclick="switchRole('student')">
                <i data-lucide="graduation-cap" width="16" height="16"></i>
                <span>Student</span>
            </button>
        </div>

        <!-- Alert Message -->
        <div id="alertMessage" class="alert"></div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container">
            <form onsubmit="handleLogin(event)">
                <div id="dynamicFields" class="dynamic-fields">
                    <!-- Admin Fields (Default) -->
                    <div class="form-group">
                        <label>Admin ID</label>
                        <div class="input-wrapper">
                            <i data-lucide="shield" width="18" height="18"></i>
                            <input type="text" id="adminId" placeholder="ADM-2024-001">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" width="18" height="18"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i data-lucide="log-in" width="18" height="18"></i>
                    Log In
                </button>

                <div class="form-footer">
                    <a href="#" class="link" onclick="showForgotPassword(event)">forgot password?</a>
                    <a href="#" class="link" onclick="showSignup(event)">create new account</a>
                </div>
            </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container hidden">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" width="18" height="18"></i>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" width="18" height="18"></i>
                        <input type="email" id="signupEmail" placeholder="student@university.edu" required>
                    </div>
                </div>

                <div id="signupDynamicFields" class="dynamic-fields"></div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" width="18" height="18"></i>
                        <input type="password" id="signupPassword" placeholder="Create a password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock-key" width="18" height="18"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i data-lucide="user-plus" width="18" height="18"></i>
                    Create Account
                </button>

                <div class="form-footer">
                    <a href="#" class="link" onclick="showLogin(event)">← Back to Login</a>
                </div>
            </form>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgotForm" class="form-container hidden">
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" width="18" height="18"></i>
                        <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i data-lucide="send" width="18" height="18"></i>
                    Send Reset Link
                </button>

                <div class="form-footer">
                    <a href="#" class="link" onclick="showLogin(event)">← Back to Login</a>
              <a href="./"admin.html><button>Admin Login</button></a>
<a href="./faculty.html"><button>Faculty Login</button></a>
<a href="./student.html"><button>Student Login</button></a>  </div>
            </form>
        </div>

        <div class="divider">
            <span>Secure Access</span>
        </div>

        <button class="btn-secondary" onclick="showGoogleLogin()">
            <i data-lucide="chrome" width="16" height="16"></i>
            Continue with Google Workspace
        </button>
    </div>

    <script>
        let currentRole = 'admin';
        let currentMode = 'login';

        lucide.createIcons();

        function switchRole(role) {
            currentRole = role;
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.innerText.toLowerCase().includes(role)) {
                    tab.classList.add('active');
                }
            });
            if (currentMode === 'login') {
                updateLoginFields();
            } else if (currentMode === 'signup') {
                updateSignupFields();
            }
            lucide.createIcons();
        }

        function updateLoginFields() {
            const container = document.getElementById('dynamicFields');
            container.innerHTML = '';
            
            if (currentRole === 'admin') {
                container.innerHTML = `<div class="form-group"><label>Admin ID</label><div class="input-wrapper"><i data-lucide="shield" width="18" height="18"></i><input type="text" id="adminId" placeholder="ADM-2024-001"></div></div>`;
            } 
            else if (currentRole === 'faculty') {
                container.innerHTML = `
                    <div class="form-group"><label>Faculty ID</label><div class="input-wrapper"><i data-lucide="id-card" width="18" height="18"></i><input type="text" id="facultyId" placeholder="FAC-2024-001"></div></div>
                    <div class="form-group"><label>Department</label><div class="double-input"><div class="input-wrapper"><i data-lucide="building" width="18" height="18"></i><select id="departmentSelect"><option value="">Select Department</option><option value="CSE">Computer Science Engineering</option><option value="IT">Information Technology</option><option value="ECE">Electronics & Communication</option><option value="ME">Mechanical Engineering</option><option value="CE">Civil Engineering</option><option value="AI">Artificial Intelligence</option></select></div><span>OR</span><div class="input-wrapper"><i data-lucide="edit" width="18" height="18"></i><input type="text" id="departmentText" placeholder="Enter department name"></div></div></div>
                `;
            } 
            else if (currentRole === 'student') {
                container.innerHTML = `
                    <div class="form-group"><label>Roll Number</label><div class="input-wrapper"><i data-lucide="hash" width="18" height="18"></i><input type="text" id="rollNumber" placeholder="2024CS001"></div></div>
                    <div class="form-group"><label>Semester</label><div class="input-wrapper"><i data-lucide="book-open" width="18" height="18"></i><select id="semester"><option value="">Select Semester</option><option value="1st">1st Semester</option><option value="2nd">2nd Semester</option><option value="3rd">3rd Semester</option><option value="4th">4th Semester</option><option value="5th">5th Semester</option><option value="6th">6th Semester</option><option value="7th">7th Semester</option><option value="8th">8th Semester</option></select></div></div>
                    <div class="form-group"><label>Section</label><div class="double-input"><div class="input-wrapper"><i data-lucide="users" width="18" height="18"></i><select id="sectionSelect"><option value="">Select Section</option><option value="A">Section A</option><option value="B">Section B</option><option value="C">Section C</option><option value="D">Section D</option></select></div><span>OR</span><div class="input-wrapper"><i data-lucide="edit" width="18" height="18"></i><input type="text" id="sectionText" placeholder="Enter section name"></div></div></div>
                `;
            }
            lucide.createIcons();
        }

        function updateSignupFields() {
            const container = document.getElementById('signupDynamicFields');
            container.innerHTML = '';
            
            if (currentRole === 'admin') {
                container.innerHTML = `<div class="form-group"><label>Admin ID</label><div class="input-wrapper"><i data-lucide="shield" width="18" height="18"></i><input type="text" id="signupAdminId" placeholder="ADM-2024-001"></div></div>`;
            } 
            else if (currentRole === 'faculty') {
                container.innerHTML = `
                    <div class="form-group"><label>Faculty ID</label><div class="input-wrapper"><i data-lucide="id-card" width="18" height="18"></i><input type="text" id="signupFacultyId" placeholder="FAC-2024-001"></div></div>
                    <div class="form-group"><label>Department</label><div class="double-input"><div class="input-wrapper"><i data-lucide="building" width="18" height="18"></i><select id="signupDepartmentSelect"><option value="">Select Department</option><option value="CSE">Computer Science Engineering</option><option value="IT">Information Technology</option><option value="ECE">Electronics & Communication</option><option value="ME">Mechanical Engineering</option><option value="CE">Civil Engineering</option><option value="AI">Artificial Intelligence</option></select></div><span>OR</span><div class="input-wrapper"><i data-lucide="edit" width="18" height="18"></i><input type="text" id="signupDepartmentText" placeholder="Enter department name"></div></div></div>
                `;
            } 
            else if (currentRole === 'student') {
                container.innerHTML = `
                    <div class="form-group"><label>Roll Number</label><div class="input-wrapper"><i data-lucide="hash" width="18" height="18"></i><input type="text" id="signupRollNumber" placeholder="2024CS001"></div></div>
                    <div class="form-group"><label>Semester</label><div class="input-wrapper"><i data-lucide="book-open" width="18" height="18"></i><select id="signupSemester"><option value="">Select Semester</option><option value="1st">1st Semester</option><option value="2nd">2nd Semester</option><option value="3rd">3rd Semester</option><option value="4th">4th Semester</option><option value="5th">5th Semester</option><option value="6th">6th Semester</option><option value="7th">7th Semester</option><option value="8th">8th Semester</option></select></div></div>
                    <div class="form-group"><label>Section</label><div class="double-input"><div class="input-wrapper"><i data-lucide="users" width="18" height="18"></i><select id="signupSectionSelect"><option value="">Select Section</option><option value="A">Section A</option><option value="B">Section B</option><option value="C">Section C</option><option value="D">Section D</option></select></div><span>OR</span><div class="input-wrapper"><i data-lucide="edit" width="18" height="18"></i><input type="text" id="signupSectionText" placeholder="Enter section name"></div></div></div>
                `;
            }
            lucide.createIcons();
        }

        function getDepartmentValue() {
            const select = document.getElementById('departmentSelect');
            const text = document.getElementById('departmentText');
            return select?.value || text?.value || '';
        }

        function getSectionValue() {
            const select = document.getElementById('sectionSelect');
            const text = document.getElementById('sectionText');
            return select?.value || text?.value || '';
        }

        function getSignupDepartmentValue() {
            const select = document.getElementById('signupDepartmentSelect');
            const text = document.getElementById('signupDepartmentText');
            return select?.value || text?.value || '';
        }

        function getSignupSectionValue() {
            const select = document.getElementById('signupSectionSelect');
            const text = document.getElementById('signupSectionText');
            return select?.value || text?.value || '';
        }

        function showAlert(message, type = 'info') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'}" width="16" height="16"></i> ${message}`;
            lucide.createIcons();
            setTimeout(() => alertDiv.classList.remove('show'), 3000);
        }

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('loginPassword').value;
            if (!password) { showAlert('Please enter your password', 'error'); return; }
            
            if (currentRole === 'admin') {
                if (!document.getElementById('adminId')?.value) { showAlert('Please enter Admin ID', 'error'); return; }
                showAlert('Login successful! Redirecting to Admin Dashboard...', 'success');
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } 
            else if (currentRole === 'faculty') {
                if (!document.getElementById('facultyId')?.value) { showAlert('Please enter Faculty ID', 'error'); return; }
                if (!getDepartmentValue()) { showAlert('Please enter your department', 'error'); return; }
                showAlert('Login successful! Redirecting to Faculty Dashboard...', 'success');
                setTimeout(() => window.location.href = 'faculty.html', 1000);
            } 
            else if (currentRole === 'student') {
                if (!document.getElementById('rollNumber')?.value) { showAlert('Please enter your Roll Number', 'error'); return; }
                if (!document.getElementById('semester')?.value) { showAlert('Please select your semester', 'error'); return; }
                if (!getSectionValue()) { showAlert('Please enter your section', 'error'); return; }
                const studentData = {
                    rollNumber: document.getElementById('rollNumber').value,
                    semester: document.getElementById('semester').value,
                    section: getSectionValue(),
                    role: 'student',
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('userData', JSON.stringify(studentData));
                localStorage.setItem('userRole', 'student');
                showAlert('Login successful! Redirecting to Student Dashboard...', 'success');
                setTimeout(() => window.location.href = 'student.html', 1000);
            }
        }

        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (!name || !email || !password) { showAlert('Please fill all required fields', 'error'); return; }
            if (password !== confirmPassword) { showAlert('Passwords do not match', 'error'); return; }
            
            if (currentRole === 'admin') {
                if (!document.getElementById('signupAdminId')?.value) { showAlert('Please enter Admin ID', 'error'); return; }
            } else if (currentRole === 'faculty') {
                if (!document.getElementById('signupFacultyId')?.value) { showAlert('Please enter Faculty ID', 'error'); return; }
                if (!getSignupDepartmentValue()) { showAlert('Please enter your department', 'error'); return; }
            } else if (currentRole === 'student') {
                if (!document.getElementById('signupRollNumber')?.value) { showAlert('Please enter Roll Number', 'error'); return; }
                if (!document.getElementById('signupSemester')?.value) { showAlert('Please select semester', 'error'); return; }
                if (!getSignupSectionValue()) { showAlert('Please enter section', 'error'); return; }
            }
            
            showAlert('Account created successfully! Please login.', 'success');
            setTimeout(() => showLogin(), 1500);
        }

        function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            if (!email) { showAlert('Please enter your email address', 'error'); return; }
            showAlert(`Password reset link sent to ${email}. Please check your inbox.`, 'success');
            setTimeout(() => showLogin(), 2000);
        }

        function showSignup(event) { if (event) event.preventDefault(); currentMode = 'signup'; document.getElementById('loginForm').classList.add('hidden'); document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('forgotForm').classList.add('hidden'); updateSignupFields(); lucide.createIcons(); }
        function showLogin(event) { if (event) event.preventDefault(); currentMode = 'login'; document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('signupForm').classList.add('hidden'); document.getElementById('forgotForm').classList.add('hidden'); updateLoginFields(); lucide.createIcons(); }
        function showForgotPassword(event) { if (event) event.preventDefault(); currentMode = 'forgot'; document.getElementById('loginForm').classList.add('hidden'); document.getElementById('signupForm').classList.add('hidden'); document.getElementById('forgotForm').classList.remove('hidden'); lucide.createIcons(); }
        function showGoogleLogin() { showAlert('Google Workspace integration coming soon!', 'info'); }

        updateLoginFields();
    </script>
</body>
